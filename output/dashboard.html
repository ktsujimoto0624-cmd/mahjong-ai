<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SimMahjong - ダッシュボード</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Meiryo', 'Yu Gothic', sans-serif;
    background: #0d2818; color: #fff; padding: 16px;
}
.header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 16px; margin-bottom: 16px;
    background: #0a1f10; border-radius: 8px; border: 1px solid #2a5;
}
.header h1 { font-size: 20px; color: #fd6; }
.header a { color: #6cf; font-size: 13px; text-decoration: none; }
.container { max-width: 900px; margin: 0 auto; }
.panel {
    background: #0a1f10; border: 1px solid #2a5; border-radius: 8px;
    padding: 16px; margin-bottom: 16px;
}
.panel h2 { font-size: 16px; color: #8c8; margin-bottom: 12px; border-bottom: 1px solid #2a5; padding-bottom: 6px; }
.form-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; }
.form-row label { font-size: 13px; min-width: 80px; color: #aaa; }
.form-row select, .form-row input {
    background: #1a3a2a; border: 1px solid #4a9; color: #fff;
    padding: 6px 10px; border-radius: 4px; font-size: 13px;
}
.agent-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 8px; }
.agent-card {
    background: #1a3a2a; border: 1px solid #3a6; border-radius: 6px;
    padding: 10px; text-align: center; font-size: 12px;
}
.agent-card .wind { font-size: 18px; font-weight: bold; color: #fd6; }
.agent-card select { width: 100%; margin-top: 6px; }
.agent-desc { font-size: 10px; color: #8a8; margin-top: 4px; min-height: 28px; }
.btn-run {
    display: block; width: 100%; padding: 14px;
    background: linear-gradient(135deg, #2d6a3f, #1a8a4f);
    border: 2px solid #4a9; border-radius: 8px;
    color: #fff; font-size: 18px; font-weight: bold;
    cursor: pointer; transition: all 0.2s; margin: 16px 0;
}
.btn-run:hover { background: linear-gradient(135deg, #3a8a5f, #2aaa6f); transform: translateY(-1px); }
.btn-run:disabled { opacity: 0.5; cursor: default; transform: none; }
.result-panel { display: none; }
.result-panel.show { display: block; }
table { width: 100%; border-collapse: collapse; margin-top: 8px; }
th, td { border: 1px solid #3a6; padding: 8px 12px; text-align: center; font-size: 13px; }
th { background: #1a3a2a; }
a { color: #6cf; }
.status { text-align: center; padding: 20px; color: #8a8; font-size: 14px; }
.progress-bar {
    width: 100%; height: 6px; background: #1a3a2a; border-radius: 3px;
    margin-top: 8px; overflow: hidden; display: none;
}
.progress-bar .fill {
    height: 100%; background: #4a9; border-radius: 3px;
    transition: width 0.3s;
}
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>SimMahjong</h1>
        <a href="index.html">← タイトルへ</a>
    </div>

    <div class="panel">
        <h2>対局設定</h2>
        <div class="form-row">
            <label>対戦モード</label>
            <select id="mode">
                <option value="tonnansen">東南戦（半荘）</option>
                <option value="tonpusen">東風戦</option>
            </select>
        </div>

        <h2 style="margin-top:16px;">エージェント選択</h2>
        <div class="agent-grid" id="agent-grid"></div>
    </div>

    <button class="btn-run" id="btn-run" onclick="runSim()">半荘シミュレーション実行</button>
    <div class="progress-bar" id="progress"><div class="fill" id="progress-fill"></div></div>

    <div class="status" id="status">Pyodide (ブラウザ内Python) を読み込み中...</div>

    <div class="result-panel" id="result-panel">
        <div class="panel">
            <h2>最終順位</h2>
            <table id="ranking-table">
                <tr><th>順位</th><th>席</th><th>エージェント</th><th>点数</th></tr>
            </table>
        </div>
        <div class="panel">
            <h2>局一覧</h2>
            <table id="rounds-table">
                <tr><th>局</th><th>結果</th><th>和了者</th><th>打点</th></tr>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/pyodide/v0.27.5/full/pyodide.js"></script>
<script>
const AGENT_INFO = {
    shanten: { name: 'ShantenAgent', model: 'shanten-v1',
        desc: 'シャンテン数最小化。受入枚数重視。門前リーチ志向。' },
    random: { name: 'RandomAgent', model: 'random-v1',
        desc: 'ランダム打牌。ベースライン比較用。' }
};
const WINDS = ['東','南','西','北'];

// エージェント選択UI生成
let gridEl = document.getElementById('agent-grid');
for (let i = 0; i < 4; i++) {
    let card = document.createElement('div');
    card.className = 'agent-card';
    card.innerHTML = '<div class="wind">' + WINDS[i] + '</div>' +
        '<select class="agent-select" onchange="updateDesc(this)">' +
        '<option value="shanten" selected>ShantenAgent</option>' +
        '<option value="random">RandomAgent</option></select>' +
        '<div class="agent-desc">' + AGENT_INFO.shanten.desc + '</div>';
    gridEl.appendChild(card);
}

function updateDesc(sel) {
    let key = sel.value;
    sel.parentElement.querySelector('.agent-desc').textContent = AGENT_INFO[key].desc;
}

// Pyodide初期化
let pyodide = null;
let pyReady = false;

function ensureDir(fs, path) {
    let parts = path.split('/').filter(p => p);
    let cur = '';
    for (let p of parts) {
        cur += '/' + p;
        try { fs.mkdir(cur); } catch(e) { /* already exists */ }
    }
}

async function initPyodide() {
    try {
        document.getElementById('status').textContent = 'Python環境を読み込み中... (初回は10秒程度かかります)';
        pyodide = await loadPyodide();

        document.getElementById('status').textContent = '麻雀エンジンを読み込み中...';

        let dirs = [
            'mahjong', 'mahjong/engine', 'mahjong/game',
            'mahjong/scoring', 'mahjong/record',
            'agents', 'agents/external'
        ];
        for (let d of dirs) {
            ensureDir(pyodide.FS, '/home/pyodide/' + d);
        }

        let files = [
            'mahjong/__init__.py', 'mahjong/engine/__init__.py',
            'mahjong/engine/tile.py', 'mahjong/engine/wall.py',
            'mahjong/engine/player.py', 'mahjong/engine/agari.py',
            'mahjong/game/__init__.py', 'mahjong/game/round.py',
            'mahjong/game/naki.py', 'mahjong/game/hanchan.py',
            'mahjong/record/__init__.py', 'mahjong/record/record.py',
            'mahjong/scoring/__init__.py', 'mahjong/scoring/score.py',
            'mahjong/scoring/yaku.py',
            'agents/__init__.py', 'agents/base.py',
            'agents/random_agent.py', 'agents/shanten_agent.py',
            'agents/external/__init__.py'
        ];

        for (let f of files) {
            let resp = await fetch('engine/' + f);
            if (!resp.ok) throw new Error('ファイル取得失敗: ' + f);
            let code = await resp.text();
            pyodide.FS.writeFile('/home/pyodide/' + f, code);
        }

        // importキャッシュをクリア
        pyodide.runPython('import importlib; importlib.invalidate_caches()');

        pyReady = true;
        document.getElementById('status').textContent = '準備完了！「半荘シミュレーション実行」を押してください。';
        document.getElementById('btn-run').disabled = false;
    } catch (e) {
        document.getElementById('status').textContent = 'エラー: ' + (e.message || e);
        console.error('Pyodide init error:', e);
    }
}

document.getElementById('btn-run').disabled = true;
initPyodide();

async function runSim() {
    if (!pyReady) return;
    let btn = document.getElementById('btn-run');
    btn.disabled = true;
    btn.textContent = '実行中...';
    document.getElementById('status').textContent = '半荘シミュレーション実行中...';
    document.getElementById('status').style.display = 'block';
    let prog = document.getElementById('progress');
    prog.style.display = 'block';
    document.getElementById('progress-fill').style.width = '30%';

    // UI設定を取得
    let mode = document.getElementById('mode').value;
    let agentSels = document.querySelectorAll('.agent-select');
    let agentTypes = [];
    for (let s of agentSels) agentTypes.push(s.value);

    // 結果パネルをリセット
    let rp = document.getElementById('result-panel');
    rp.classList.remove('show');
    let rt = document.getElementById('ranking-table');
    let rdt = document.getElementById('rounds-table');
    while (rt.rows.length > 1) rt.deleteRow(1);
    while (rdt.rows.length > 1) rdt.deleteRow(1);

    try {
        document.getElementById('progress-fill').style.width = '50%';

        let resultJson = await pyodide.runPythonAsync(`
import json
from mahjong.game.hanchan import Hanchan
from agents import ShantenAgent, RandomAgent

agent_types = ${JSON.stringify(agentTypes)}
winds = ['東','南','西','北']
agents = []
for i, at in enumerate(agent_types):
    name = winds[i] + 'AI'
    if at == 'random':
        agents.append(RandomAgent(name=name))
    else:
        agents.append(ShantenAgent(name=name))

hanchan = Hanchan(agents, mode='${mode}')
result = hanchan.run()
json.dumps(result, ensure_ascii=False)
`);
        document.getElementById('progress-fill').style.width = '100%';

        let data = JSON.parse(resultJson);
        showResult(data);

        btn.textContent = '再実行';
        document.getElementById('status').style.display = 'none';
    } catch (e) {
        document.getElementById('status').textContent = 'エラー: ' + e.message;
        console.error(e);
        btn.textContent = '再実行';
    }
    btn.disabled = false;
    setTimeout(() => { prog.style.display = 'none'; }, 500);
}

function showResult(data) {
    let panel = document.getElementById('result-panel');
    panel.classList.add('show');

    let rt = document.getElementById('ranking-table');
    for (let rank = 0; rank < data.rankings.length; rank++) {
        let seat = data.rankings[rank];
        let tr = document.createElement('tr');
        tr.innerHTML = '<td>' + (rank+1) + '位</td><td>' + WINDS[seat] +
            '家</td><td>' + data.agents[seat] + '</td><td>' +
            data.points[seat] + '点</td>';
        rt.appendChild(tr);
    }

    let rdt = document.getElementById('rounds-table');
    let typeMap = {tsumo:'ツモ', ron:'ロン', ryukyoku:'流局'};
    for (let i = 0; i < data.round_results.length; i++) {
        let r = data.round_results[i];
        let winner = r.winner !== null ? WINDS[r.winner] + '家' : '-';
        let pts = r.score ? r.score.payments.total + '点' : '-';
        let yaku = r.score ? r.score.yaku.map(y => y[0]).join(', ') : '';
        let tr = document.createElement('tr');
        tr.innerHTML = '<td>' + r.round_label + '</td><td>' +
            (typeMap[r.type]||r.type) + '</td><td>' + winner +
            '</td><td>' + pts + (yaku ? '<br><small style="color:#8a8">' +
            yaku + '</small>' : '') + '</td>';
        rdt.appendChild(tr);
    }
}
</script>
</body>
</html>
