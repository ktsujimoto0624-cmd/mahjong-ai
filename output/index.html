<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SimMahjong</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    background: #121212;
    color: #fff; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.title-screen { text-align: center; padding: 40px; }
.logo {
    font-size: 56px; font-weight: bold; letter-spacing: 4px;
    background: linear-gradient(180deg, #ffd700 0%, #ff8c00 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
}
.subtitle { font-size: 16px; color: #B3B3B3; margin-bottom: 40px; letter-spacing: 2px; }
.menu { display: flex; flex-direction: column; gap: 12px; align-items: center; }
.menu a {
    display: block; width: 280px; padding: 14px 24px;
    background: #181818; border: none;
    border-radius: 8px; color: #fff; text-decoration: none;
    font-size: 16px; text-align: center; transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.menu a:hover {
    background: #282828;
    transform: scale(1.04); box-shadow: 0 4px 16px rgba(0,0,0,0.4);
}
.menu a .desc { font-size: 11px; color: #B3B3B3; margin-top: 4px; }
.version { position: fixed; bottom: 12px; right: 16px; font-size: 11px; color: #535353; }
.tiles-deco {
    margin-top: 30px; opacity: 0.4; display: flex; gap: 4px; justify-content: center;
}
.tiles-deco img { height: 44px; border-radius: 3px; background: #f5f0e0; padding: 1px; }
</style>
</head>
<body>
<div class="title-screen">
    <div class="logo">SimMahjong</div>
    <div class="subtitle">麻雀AIシミュレーター</div>
    <div class="menu">
        <a href="dashboard.html">
            シミュレーション
            <div class="desc">エージェント選択 → 半荘実行 → 牌譜再生</div>
        </a>
        <a href="records.html">
            牌譜一覧
            <div class="desc">過去のシミュレーション結果を閲覧</div>
        </a>
        <a href="sample_record.html">
            サンプル牌譜
            <div class="desc">牌譜ビューアのデモ</div>
        </a>
        <a href="playbook.html">
            PLAYBOOK
            <div class="desc">ルールブック・実装仕様</div>
        </a>
    </div>
    <div class="tiles-deco">
        <img src="tiles/Ton.svg"><img src="tiles/Nan.svg"><img src="tiles/Shaa.svg">
        <img src="tiles/Pei.svg"><img src="tiles/Haku.svg"><img src="tiles/Hatsu.svg">
        <img src="tiles/Chun.svg">
    </div>
</div>
<div class="version">SimMahjong v0.1</div>
</body>
</html>
